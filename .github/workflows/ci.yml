name: CI

# Bloque 4 / Paso 1 — gate de calidad en dos capas:
#   quality          → siempre (push, PR, manual): install + lint + build. Sin secrets.
#   financial-verify → tras quality, solo con secrets disponibles y NO en forks:
#                      verificadores read-only / test-safe. Nunca mueve dinero real.
#
# Reglas duras:
#   - Si faltan secrets, financial-verify queda SKIPPED de forma explícita, no rojo.
#   - financial-drift falla el CI solo si hay `critical`; los warnings conocidos no fallan.
#   - No se ejecutan scripts de repair ni nada que cree transfers/refunds/payouts.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancela corridas antiguas del mismo ref para no malgastar minutos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (lint + build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  financial-verify:
    name: Financial & RLS verifiers (read-only)
    needs: quality
    runs-on: ubuntu-latest
    # No correr en PRs desde forks: no tienen acceso a los secrets del repo.
    # push y workflow_dispatch siempre pasan este guard; los PRs solo si son del mismo repo.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Las 5 claves son obligatorias: financial-ops.mjs exige las 3 de Supabase al
      # importarse y stripe.service.js construye `new Stripe(STRIPE_SECRET_KEY)` al cargar,
      # por lo que los verificadores crashean (no fallan "de negocio") sin ellas.
      - name: Check secrets availability
        id: preflight
        run: |
          if [ -n "$SUPABASE_URL" ] \
            && [ -n "$SUPABASE_ANON_KEY" ] \
            && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] \
            && [ -n "$STRIPE_SECRET_KEY" ] \
            && [ -n "$STRIPE_WEBHOOK_SECRET" ]; then
            echo "have_secrets=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Financial verifiers::Secrets present — running read-only verifiers."
          else
            echo "have_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Financial verifiers skipped::Required test secrets are not configured; financial-verify steps are skipped (not failed)."
          fi

      # Orden: capas puras de Supabase/eventos sintéticos primero; drift (gate por critical) al final.
      # Todos son read-only o test-safe (crean y autolimpian datos de TEST; no tocan Stripe live).
      - name: verify:stripe-event-layer
        if: steps.preflight.outputs.have_secrets == 'true'
        run: pnpm run verify:stripe-event-layer

      - name: verify:webhook-reliability
        if: steps.preflight.outputs.have_secrets == 'true'
        run: pnpm run verify:webhook-reliability

      - name: verify:rls-payment-gate
        if: steps.preflight.outputs.have_secrets == 'true'
        run: pnpm run verify:rls-payment-gate

      - name: verify:rls-ownership
        if: steps.preflight.outputs.have_secrets == 'true'
        run: pnpm run verify:rls-ownership

      # Exit 1 solo si hay findings `critical`. Los 6 warnings conocidos dejan exit 0.
      - name: verify:financial-drift
        if: steps.preflight.outputs.have_secrets == 'true'
        run: pnpm run verify:financial-drift
